<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Criar Conta — Economia dos Milionários</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;padding-top:0;">

<div class="card" style="width:100%;max-width:420px;margin:auto;">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <div style="font-size:3rem;">🎲</div>
      <h4 class="text-warning fw-bold mb-0">Criar Conta</h4>
      <p class="text-muted small">Sua conta precisará ser ativada pelo administrador</p>
    </div>

    <div id="alerta" class="alert d-none"></div>

    <form id="formCadastro" novalidate>
      <div class="mb-3">
        <label class="form-label small">Nome</label>
        <input type="text" id="nome" class="form-control" placeholder="Seu nome completo" required>
      </div>
      <div class="mb-3">
        <label class="form-label small">E-mail</label>
        <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label small">Senha</label>
        <input type="password" id="senha" class="form-control" placeholder="Mínimo 6 caracteres" required>
      </div>
      <button type="submit" class="btn btn-warning w-100 fw-bold">Criar Conta</button>
    </form>

    <hr class="my-3">
    <p class="text-center small text-muted mb-0">
      Já tem conta? <a href="/login.html" class="text-info">Entrar</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { apiRegister } from './js/api.js';

  document.getElementById('formCadastro').addEventListener('submit', async e => {
    e.preventDefault();
    const alerta = document.getElementById('alerta');
    alerta.className = 'alert d-none';

    const nome  = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    if (!nome || !email || !senha) {
      alerta.className = 'alert alert-warning';
      alerta.textContent = 'Preencha todos os campos.';
      return;
    }
    if (senha.length < 6) {
      alerta.className = 'alert alert-warning';
      alerta.textContent = 'A senha deve ter pelo menos 6 caracteres.';
      return;
    }

    try {
      const result = await apiRegister(nome, email, senha);
      alerta.className = 'alert alert-success';
      alerta.textContent = result.message;
      document.getElementById('formCadastro').reset();
      setTimeout(() => window.location.href = '/login.html', 3000);
    } catch (err) {
      alerta.className = 'alert alert-danger';
      alerta.textContent = err.message;
    }
  });
</script>
</body>
</html>
