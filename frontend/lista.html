<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minhas Partidas — Economia dos Milionários</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark fixed-top px-3">
  <span class="navbar-brand">🎲 Economia dos Milionários — Minhas Partidas</span>
  <div class="d-flex gap-2">
    <a class="btn btn-sm btn-outline-success" href="/">+ Nova Partida</a>
    <button class="btn btn-sm btn-outline-danger" onclick="fazerLogout()">🚪 Sair</button>
  </div>
</nav>

<div class="container mt-4">
  <div id="carregando" class="text-center text-light my-5">
    <div class="spinner-border text-warning" role="status"></div>
    <p class="mt-2">Carregando partidas...</p>
  </div>

  <div id="semPartidas" class="text-center text-light my-5" style="display:none">
    <p class="fs-5">Nenhuma partida salva ainda.</p>
    <a class="btn btn-warning" href="/">Iniciar Nova Partida</a>
  </div>

  <div id="containerLista" style="display:none">
    <div class="table-responsive">
      <table class="table table-sm table-bordered">
        <thead>
          <tr>
            <th></th>
            <th>Data/Hora</th>
            <th>Nome</th>
            <th>Jogadores</th>
            <th>Rodada</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbodyLista"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireLogin, logout } from './js/auth.js';
  import { listGames, deleteGame, renameGame } from './js/api.js';

  if (!requireLogin()) throw new Error('Não autenticado');

  window.fazerLogout = function() { logout(); };

  async function carregarLista() {
    try {
      const partidas = await listGames();
      document.getElementById('carregando').style.display = 'none';

      if (!partidas.length) {
        document.getElementById('semPartidas').style.display = 'block';
        return;
      }

      document.getElementById('containerLista').style.display = 'block';
      const tbody = document.getElementById('tbodyLista');
      tbody.innerHTML = partidas.map(p => {
        const dt = new Date(p.saved_at).toLocaleString('pt-BR');
        return `
          <tr>
            <td>
              <button class="btn btn-sm btn-danger" onclick="excluir('${p.game_id}', this)">🗑</button>
            </td>
            <td><a href="/?gameId=${p.game_id}" class="text-warning">${dt}</a></td>
            <td>
              <input class="form-control form-control-sm bg-dark text-light border-secondary"
                     value="${p.no_estado || ''}"
                     placeholder="(sem nome)"
                     onchange="renomear('${p.game_id}', this.value)">
            </td>
            <td class="text-center">${p.qt_jogadores}</td>
            <td class="text-center">${p.nr_rodada}</td>
            <td>
              <a href="/?gameId=${p.game_id}" class="btn btn-sm btn-success">▶ Entrar</a>
            </td>
          </tr>`;
      }).join('');
    } catch (err) {
      document.getElementById('carregando').innerHTML =
        `<p class="text-danger">${err.message}</p>`;
    }
  }

  window.excluir = async function(gameId, btn) {
    if (!confirm('Excluir esta partida?')) return;
    await deleteGame(gameId);
    btn.closest('tr').remove();
  };

  window.renomear = async function(gameId, nome) {
    await renameGame(gameId, nome);
  };

  carregarLista();
</script>
</body>
</html>
