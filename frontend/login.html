<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Economia dos Milionários</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;padding-top:0;">

<div class="card" style="width:100%;max-width:420px;margin:auto;">
  <div class="card-body p-4">
    <div class="text-center mb-4">
      <div style="font-size:3rem;">🎲</div>
      <h4 class="text-warning fw-bold mb-0">Economia dos Milionários</h4>
      <p class="text-muted small">Faça login para continuar</p>
    </div>

    <div id="alerta" class="alert d-none"></div>

    <form id="formLogin" novalidate>
      <div class="mb-3">
        <label class="form-label small">E-mail</label>
        <input type="email" id="email" class="form-control" placeholder="seu@email.com" autocomplete="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label small">Senha</label>
        <input type="password" id="senha" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-warning w-100 fw-bold">Entrar</button>
    </form>

    <hr class="my-3">
    <p class="text-center small text-muted mb-0">
      Não tem conta?
      <a href="/cadastro.html" class="text-info">Criar conta</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { apiLogin } from './js/api.js';
  import { setToken, setUser, isLoggedIn } from './js/auth.js';

  if (isLoggedIn()) window.location.href = '/lista.html';

  document.getElementById('formLogin').addEventListener('submit', async e => {
    e.preventDefault();
    const alerta = document.getElementById('alerta');
    alerta.className = 'alert d-none';

    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;

    try {
      const { token, user } = await apiLogin(email, senha);
      setToken(token);
      setUser(user);
      window.location.href = '/lista.html';
    } catch (err) {
      alerta.className = 'alert alert-danger';
      alerta.textContent = err.message;
    }
  });
</script>
</body>
</html>
