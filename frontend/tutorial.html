<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Como Jogar — Economia dos Milionários</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #fff8e3;
      background:
        radial-gradient(ellipse at 50% 0%, #14181f 0%, #08090d 60%, #050608 100%);
    }

    /* ── Header ─────────────────────────────────────── */
    .tut-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(5,6,8,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,209,92,0.18);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .tut-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid rgba(255,209,92,0.35);
      color: #FFE9A0;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .tut-back:hover { background: rgba(255,209,92,0.1); border-color: rgba(255,209,92,0.65); color: #FFE9A0; }
    .tut-header-titulo {
      font-family: 'Anton', sans-serif;
      font-size: 1rem;
      color: #FFE9A0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Wrapper ─────────────────────────────────────── */
    .tut-wrapper {
      max-width: 660px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }

    /* ── Progress ─────────────────────────────────────── */
    .tut-progress-track {
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      height: 5px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .tut-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #C7891A, #FFE9A0);
      border-radius: 99px;
      transition: width 0.35s ease;
    }
    .tut-progress-label {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: rgba(255,209,92,0.5);
      letter-spacing: 0.1em;
      margin-bottom: 22px;
    }

    /* ── Slide card ─────────────────────────────────────── */
    .tut-card {
      background: linear-gradient(160deg, rgba(255,235,170,0.07) 0%, rgba(255,235,170,0.02) 100%);
      border: 1px solid rgba(255,209,92,0.28);
      border-radius: 22px;
      padding: 38px 34px 30px;
      min-height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow:
        0 0 50px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,235,170,0.09);
      position: relative;
      overflow: hidden;
      will-change: opacity, transform;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    .tut-card::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background:
        repeating-linear-gradient(0deg,  rgba(255,209,92,0.018) 0 1px, transparent 1px 28px),
        repeating-linear-gradient(90deg, rgba(255,209,92,0.018) 0 1px, transparent 1px 28px);
    }

    .slide-emoji {
      font-size: 3.8rem;
      line-height: 1;
      margin-bottom: 14px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.55));
      position: relative; z-index: 1;
    }
    .slide-titulo {
      font-family: 'Anton', sans-serif;
      font-size: 1.55rem;
      color: #FFE9A0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 22px;
      line-height: 1.1;
      text-shadow: 0 0 22px rgba(255,209,92,0.25);
      position: relative; z-index: 1;
    }
    .slide-corpo {
      font-family: 'Inter', sans-serif;
      font-size: 1.02rem;
      color: rgba(255,248,227,0.9);
      line-height: 1.75;
      text-align: left;
      width: 100%;
      position: relative; z-index: 1;
    }
    .slide-corpo p { margin: 0 0 10px; }
    .slide-corpo strong { color: #FFE9A0; }

    .bloco {
      background: rgba(255,235,170,0.06);
      border: 1px solid rgba(255,209,92,0.22);
      border-radius: 10px;
      padding: 12px 16px;
      margin: 8px 0;
      font-size: 0.97rem;
      line-height: 1.65;
    }
    .bloco-verde {
      background: rgba(39,209,124,0.08);
      border-color: rgba(39,209,124,0.28);
      color: #c8ffea;
    }
    .bloco-verde strong { color: #27D17C; }

    /* ── Navigation ─────────────────────────────────────── */
    .tut-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
    }
    .btn-nav {
      background: transparent;
      border: 1px solid rgba(255,209,92,0.35);
      color: #FFE9A0;
      font-family: 'Anton', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      padding: 10px 22px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      min-width: 108px;
    }
    .btn-nav:hover:not(:disabled) {
      background: rgba(255,209,92,0.1);
      border-color: rgba(255,209,92,0.6);
    }
    .btn-nav:disabled { opacity: 0.22; cursor: not-allowed; }
    .btn-nav-proximo {
      background: linear-gradient(135deg, #C7891A, #E0A91A);
      border-color: #FFD15C;
      color: #3D2603;
      font-size: 0.9rem;
    }
    .btn-nav-proximo:hover:not(:disabled) {
      background: linear-gradient(135deg, #E0A91A, #FFE9A0);
      border-color: #FFE9A0;
    }

    /* ── Dots ─────────────────────────────────────── */
    .tut-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      margin-top: 22px;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,209,92,0.18);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .dot:hover { background: rgba(255,209,92,0.4); }
    .dot.ativo {
      background: #FFD15C;
      transform: scale(1.5);
    }

    /* ── Responsivo ─────────────────────────────────────── */
    @media (max-width: 520px) {
      .tut-card { padding: 26px 18px 22px; min-height: 0; }
      .slide-emoji { font-size: 2.9rem; }
      .slide-titulo { font-size: 1.2rem; }
      .slide-corpo { font-size: 0.93rem; }
      .btn-nav { padding: 8px 14px; min-width: 90px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="tut-header">
  <a class="tut-back" href="javascript:history.length > 1 ? history.back() : (location.href='/intro.html')">← Voltar</a>
  <span class="tut-header-titulo">📖 Como Jogar</span>
</div>

<!-- Tutorial -->
<div class="tut-wrapper">

  </div>

</div>

/* ── Estado ─────────────────────────────────────────── */

const total = SLIDES.length;

/* ── Renderização ───────────────────────────────────── */

  document.getElementById('slideEmoji').textContent  = s.emoji;
  document.getElementById('slideTitulo').textContent = s.titulo;
  document.getElementById('slideCorpo').innerHTML    = s.corpo;

  const pct = ((slide + 1) / total) * 100;
  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressLabel').textContent = `Passo ${slide + 1} de ${total}`;

  document.getElementById('btnAnterior').disabled = slide === 0;

  const btnP = document.getElementById('btnProximo');
  if (slide === total - 1) {
    btnP.textContent = '✅ Jogar!';
    btnP.onclick     = () => history.length > 1 ? history.back() : (location.href = '/intro.html');
  } else {
    btnP.textContent = 'Próximo ▶';
    btnP.onclick     = () => navegar(1);
  }

  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('ativo', i === slide));
}

function navegar(dir) {
  const destino = slide + dir;
  if (destino < 0 || destino >= total) return;

  const card = document.getElementById('slideCard');
  card.style.transition = 'opacity 0.15s ease, transform 0.15s ease';
  card.style.opacity    = '0';
  card.style.transform  = dir > 0 ? 'translateX(-24px)' : 'translateX(24px)';

  setTimeout(() => {
    slide = destino;
    atualizarConteudo();
    card.style.transition = 'none';
    card.style.transform  = dir > 0 ? 'translateX(24px)' : 'translateX(-24px)';
    card.style.opacity    = '0';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      card.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
      card.style.opacity    = '1';
      card.style.transform  = 'translateX(0)';
    }));
  }, 170);
}

/* ── Dots ──────────────────────────────────────────── */
const dotsEl = document.getElementById('tutDots');
SLIDES.forEach((s, i) => {
  const d     = document.createElement('button');
  d.className = 'dot';
  d.title     = s.titulo;
  d.onclick   = () => navegar(i - slide);
  dotsEl.appendChild(d);
});

/* ── Teclado ──────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navegar(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navegar(-1);
});

/* ── Init ─────────────────────────────────────────── */
atualizarConteudo();
</script>

</body>
</html>
