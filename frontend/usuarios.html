<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usuários — Economia dos Milionários</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark fixed-top px-3">
  <span class="navbar-brand">🎲 Manutenção de Usuários</span>
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-outline-success" onclick="abrirModalNovo()">+ Novo Usuário</button>
    <a class="btn btn-sm btn-outline-light" href="/">← Voltar ao Jogo</a>
  </div>
</nav>

<div class="container mt-4">
  <div id="alerta" class="alert d-none mb-3"></div>

  <div class="table-responsive">
    <table class="table table-sm table-bordered">
      <thead>
        <tr>
          <th style="width:48px;">Foto</th>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Tipo</th>
          <th>Situação</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbodyUsuarios">
        <tr><td colspan="6" class="text-center text-muted">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal Usuário -->
<div class="modal fade" id="modalUsuario" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalUsuarioTitulo">Usuário</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalAlerta" class="alert d-none mb-3"></div>
        <input type="hidden" id="userId">
        <div class="mb-3">
          <label class="form-label small">Nome</label>
          <input type="text" id="uNome" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label small">E-mail <span class="text-muted" id="uEmailHint"></span></label>
          <input type="email" id="uEmail" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label small">Senha <span class="text-muted">(deixe em branco para não alterar)</span></label>
          <input type="password" id="uSenha" class="form-control" placeholder="••••••••">
        </div>
        <div class="row g-2">
          <div class="col-6">
            <label class="form-label small">Tipo</label>
            <select id="uTipo" class="form-select">
              <option value="C">C — Comum</option>
              <option value="A">A — Administrador</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label small">Situação</label>
            <select id="uSituacao" class="form-select">
              <option value="A">Ativo</option>
              <option value="I">Inativo</option>
            </select>
          </div>
        </div>
        <div class="mt-3">
          <label class="form-label small">Foto de perfil</label>
          <div class="d-flex align-items-center gap-3">
            <div id="fotoPreview" style="width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1a1a2e;flex-shrink:0;">
              <span class="text-muted" style="font-size:1.5rem;">👤</span>
            </div>
            <div class="flex-grow-1">
              <input type="file" id="uFoto" class="form-control form-control-sm" accept="image/*" onchange="previewFoto(this)">
              <button class="btn btn-sm btn-outline-danger mt-1" onclick="removerFoto()">Remover foto</button>
            </div>
          </div>
          <input type="hidden" id="uFotoData">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-warning" onclick="salvarUsuario()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { requireAdmin } from './js/auth.js';
  import { apiGetUsers, apiCreateUser, apiUpdateUser, apiDeleteUser } from './js/api.js';

  if (!requireAdmin()) throw new Error('Acesso negado');

  let _modalInst = null;
  let _usuariosMap = {};   // id → objeto usuário

  async function carregarUsuarios() {
    try {
      const users = await apiGetUsers();
      _usuariosMap = Object.fromEntries(users.map(u => [u.id, u]));
      const tbody = document.getElementById('tbodyUsuarios');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Nenhum usuário cadastrado.</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td class="text-center">
            ${u.foto
              ? `<img src="${u.foto}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`
              : `<span style="font-size:1.4rem;">👤</span>`}
          </td>
          <td>${u.nome}</td>
          <td>${u.email}</td>
          <td><span class="badge ${u.tipo === 'A' ? 'bg-warning text-dark' : 'bg-secondary'}">${u.tipo === 'A' ? 'Admin' : 'Comum'}</span></td>
          <td><span class="badge ${u.situacao === 'A' ? 'bg-success' : 'bg-danger'}">${u.situacao === 'A' ? 'Ativo' : 'Inativo'}</span></td>
          <td class="text-nowrap">
            <button class="btn btn-sm btn-outline-primary me-1" onclick="window.editarUsuario(${u.id})">✏️</button>
            <button class="btn btn-sm btn-outline-danger" onclick="window.excluirUsuario(${u.id})">🗑</button>
          </td>
        </tr>`).join('');
    } catch (err) {
      mostrarAlerta('danger', err.message);
    }
  }

  function mostrarAlerta(tipo, msg, modal = false) {
    const id = modal ? 'modalAlerta' : 'alerta';
    const el = document.getElementById(id);
    el.className = `alert alert-${tipo}`;
    el.textContent = msg;
    setTimeout(() => el.className = 'alert d-none', 5000);
  }

  window.abrirModalNovo = function() {
    document.getElementById('modalUsuarioTitulo').textContent = 'Novo Usuário';
    document.getElementById('userId').value   = '';
    document.getElementById('uNome').value    = '';
    document.getElementById('uEmail').value   = '';
    document.getElementById('uEmail').placeholder = '';
    document.getElementById('uEmailHint').textContent = '';
    document.getElementById('uSenha').value   = '';
    document.getElementById('uTipo').value    = 'C';
    document.getElementById('uSituacao').value = 'A';
    document.getElementById('uFotoData').value = '';
    document.getElementById('fotoPreview').innerHTML = '<span class="text-muted" style="font-size:1.5rem;">👤</span>';
    document.getElementById('modalAlerta').className = 'alert d-none';
    _modalInst = new bootstrap.Modal(document.getElementById('modalUsuario'));
    _modalInst.show();
  };

  window.editarUsuario = function(id) {
    const u = _usuariosMap[id];
    if (!u) return;
    document.getElementById('modalUsuarioTitulo').textContent = 'Editar Usuário';
    document.getElementById('userId').value    = u.id;
    document.getElementById('uNome').value     = u.nome;
    document.getElementById('uEmail').value    = '';
    document.getElementById('uEmail').placeholder = u.email;
    document.getElementById('uEmailHint').textContent = `(atual: ${u.email} — deixe em branco para não alterar)`;
    document.getElementById('uSenha').value    = '';
    document.getElementById('uTipo').value     = u.tipo;
    document.getElementById('uSituacao').value = u.situacao;
    document.getElementById('uFotoData').value = u.foto || '';
    document.getElementById('modalAlerta').className = 'alert d-none';
    const prev = document.getElementById('fotoPreview');
    prev.innerHTML = u.foto
      ? `<img src="${u.foto}" style="width:100%;height:100%;object-fit:cover;">`
      : '<span class="text-muted" style="font-size:1.5rem;">👤</span>';
    _modalInst = new bootstrap.Modal(document.getElementById('modalUsuario'));
    _modalInst.show();
  };

  window.salvarUsuario = async function() {
    const id       = document.getElementById('userId').value;
    const nome     = document.getElementById('uNome').value.trim();
    const email    = document.getElementById('uEmail').value.trim();
    const senha    = document.getElementById('uSenha').value;
    const tipo     = document.getElementById('uTipo').value;
    const situacao = document.getElementById('uSituacao').value;
    const foto     = document.getElementById('uFotoData').value || null;

    if (!nome)           { mostrarAlerta('warning', 'Nome é obrigatório.', true); return; }
    if (!id && !email)   { mostrarAlerta('warning', 'E-mail é obrigatório para novo usuário.', true); return; }
    if (!id && !senha)   { mostrarAlerta('warning', 'Informe uma senha para o novo usuário.', true); return; }

    const payload = { nome, tipo, situacao, foto };
    if (email) payload.email = email;
    if (senha) payload.senha = senha;

    try {
      if (id) {
        await apiUpdateUser(id, payload);
      } else {
        await apiCreateUser(payload);
      }
      _modalInst?.hide();
      mostrarAlerta('success', id ? 'Usuário atualizado.' : 'Usuário criado.');
      carregarUsuarios();
    } catch (err) {
      mostrarAlerta('danger', err.message, true);
    }
  };

  window.excluirUsuario = async function(id) {
    const nome = _usuariosMap[id]?.nome || id;
    if (!confirm(`Excluir o usuário "${nome}"?`)) return;
    try {
      await apiDeleteUser(id);
      mostrarAlerta('success', 'Usuário excluído.');
      carregarUsuarios();
    } catch (err) {
      mostrarAlerta('danger', err.message);
    }
  };

  window.previewFoto = function(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('uFotoData').value = e.target.result;
      document.getElementById('fotoPreview').innerHTML =
        `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
    };
    reader.readAsDataURL(file);
  };

  window.removerFoto = function() {
    document.getElementById('uFotoData').value = '';
    document.getElementById('uFoto').value = '';
    document.getElementById('fotoPreview').innerHTML = '<span class="text-muted" style="font-size:1.5rem;">👤</span>';
  };

  carregarUsuarios();
</script>
</body>
</html>
